<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ramen Master - 조연주</title>
    <style>
        :root {
            --primary-color: #e74c3c;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --bg-color: #f4f7f6;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            color: #333;
        }

        header { 
            background: var(--primary-color); 
            color: white; 
            padding: 15px; 
            text-align: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        header h1 { margin: 0; font-size: 1.2rem; }
        .dev-header { font-size: 0.9rem; font-weight: bold; opacity: 0.9; margin-top: 5px; }

        .container { 
            display: flex; 
            flex-direction: row; /* PC 기본 */
            flex: 1; 
            overflow-y: auto;
        }

        /* 모바일 대응 레이아웃 */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: auto !important; border-right: none !important; border-bottom: 2px solid #ddd; }
            .timer-display { font-size: 70px !important; }
        }

        /* 왼쪽: 설정창 */
        .sidebar { 
            width: 320px; 
            padding: 20px; 
            background: white; 
            border-right: 1px solid #ddd;
            box-sizing: border-box;
        }

        .section { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--primary-color); font-size: 0.9rem; }
        
        select, button { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid #ddd; 
            font-size: 1rem;
            background-color: #fff;
        }

        .chk-group { 
            display: flex; 
            align-items: center; 
            padding: 10px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .chk-group input { margin-right: 10px; transform: scale(1.2); }

        /* 오른쪽: 타이머 및 현황 */
        .main-content { 
            flex: 1; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            background: #ffffff;
        }

        .step-info { 
            font-size: 0.9rem; 
            color: #666; 
            background: #eee; 
            padding: 4px 12px; 
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .status-msg { 
            font-size: 1.3rem; 
            font-weight: bold; 
            color: #d35400; 
            text-align: center; 
            min-height: 3.2rem;
            margin-bottom: 10px;
        }

        .timer-display { 
            font-size: 90px; 
            font-weight: 800; 
            color: #2c3e50; 
            margin: 10px 0;
            font-family: 'Courier New', Courier, monospace;
        }

        .controls { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            width: 100%; 
            max-width: 300px; 
        }

        .btn-start { background: var(--success-color); color: white; border: none; cursor: pointer; font-weight: bold; height: 55px; font-size: 1.1rem; }
        .btn-next { background: var(--secondary-color); color: white; border: none; cursor: pointer; font-weight: bold; height: 55px; font-size: 1.1rem; }
        .btn-start:active, .btn-next:active { transform: scale(0.98); opacity: 0.8; }
        button:disabled { background: #ccc !important; cursor: not-allowed; }

        footer { 
            background: #34495e; 
            color: white; 
            text-align: center; 
            padding: 12px; 
            font-size: 0.8rem;
        }
        .dev-highlight { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>🍜 Smart Ramen Master</h1>
    <div class="dev-header">20260304 조연주</div>
</header>

<div class="container">
    <div class="sidebar">
        <div class="section">
            <label>🌐 Language / 언어</label>
            <select id="langSelect" onchange="resetApp()">
                <option value="ko-KR">한국어 (Korean)</option>
                <option value="en-US">English</option>
                <option value="zh-CN">中文 (Chinese)</option>
                <option value="es-ES">Español (Spanish)</option>
                <option value="ja-JP">日本語 (Japanese)</option>
                <option value="vi-VN">Tiếng Việt (Vietnamese)</option>
            </select>
        </div>

        <div class="section">
            <label>🔥 Heat Source / 열원</label>
            <select id="heatSource">
                <option value="induction">인덕션 (Induction)</option>
                <option value="gas">가스레인지 (Gas Range)</option>
            </select>
        </div>

        <div class="section">
            <label>🍜 Ramen Type / 종류</label>
            <select id="ramenType">
                <option value="270">일반 라면 (4분 30초)</option>
                <option value="300">굵은 면 (5분)</option>
                <option value="120">얇은 면 (2분)</option>
                <option value="301">볶음면 (5분+α)</option>
            </select>
        </div>

        <div class="section">
            <label>🥬 Toppings / 토핑</label>
            <div class="chk-group"><input type="checkbox" id="riceCake"> 떡국떡</div>
            <div class="chk-group"><input type="checkbox" id="greenOnion"> 파</div>
            <div class="chk-group"><input type="checkbox" id="cheese"> 치즈</div>
        </div>

        <div class="section">
            <label>🥚 Egg Option / 계란</label>
            <select id="eggOption">
                <option value="none">없음</option>
                <option value="soft">반숙</option>
                <option value="hard">완숙</option>
            </select>
        </div>
    </div>

    <div class="main-content">
        <div id="stepInfo" class="step-info">Ready</div>
        <div id="statusMsg" class="status-msg">설정 후 시작 버튼을 누르세요.</div>
        <div id="timer" class="timer-display">00:00</div>
        
        <div class="controls">
            <button id="startBtn" class="btn-start" onclick="startCurrentStep()">시작 (START)</button>
            <button id="nextBtn" class="btn-next" onclick="handleNextStep()" disabled>다음 단계 (NEXT)</button>
        </div>
    </div>
</div>

<footer>
    © 2026 Smart Ramen | Dev: <span class="dev-highlight">20260304 조연주</span>
</footer>

<script>
    const translations = {
        "ko-KR": { water: "물을 끓여주세요.", noodles: "면과 스프를 넣어주세요.", egg: "지금 계란을 넣어주세요.", topping: "토핑을 넣어주세요.", finish: "완성! 맛있게 드세요.", start: "시작", next: "다음 단계", boil: "물 끓이기", cook: "면 익히기", ready: "준비 완료" },
        "en-US": { water: "Boil the water.", noodles: "Add noodles and soup.", egg: "Add egg now.", topping: "Add toppings.", finish: "Enjoy your meal!", start: "Start", next: "Next", boil: "Boil Water", cook: "Cook Noodles", ready: "Ready" },
        "zh-CN": { water: "请烧开水。", noodles: "放入面条和调料。", egg: "放入鸡蛋。", topping: "放入配料。", finish: "做好了！请享用。", start: "开始", next: "下一步", boil: "烧水", cook: "煮面", ready: "准备好了" },
        "ja-JP": { water: "水を沸騰させてください。", noodles: "麺とスープを入れてください。", egg: "卵を入れてください。", topping: "トッピングを入れてください。", finish: "召し上がれ！", start: "開始", next: "次へ", boil: "お湯を沸かす", cook: "麺を茹でる", ready: "準備完了" },
        "vi-VN": { water: "Đun sôi nước.", noodles: "Cho mì và gia vị vào.", egg: "Cho trứng vào.", topping: "Cho topping vào.", finish: "Chúc bạn ngon miệng!", start: "Bắt đầu", next: "Kế tiếp", boil: "Đun nước", cook: "Nấu mì", ready: "Sẵn sàng" }
    };

    let currentStep = 0;
    let timerInterval;
    let steps = [];

    function getMsg(key) {
        const lang = document.getElementById('langSelect').value;
        return (translations[lang] || translations["en-US"])[key];
    }

    function speak(text) {
        // 이모티콘 읽지 않기
        const cleanText = text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
        const msg = new SpeechSynthesisUtterance(cleanText);
        msg.lang = document.getElementById('langSelect').value;
        window.speechSynthesis.speak(msg);
    }

    function initSteps() {
        steps = [];
        const heat = document.getElementById('heatSource').value;
        const boilTime = (heat === 'induction') ? 180 : 240; 
        steps.push({ name: getMsg('boil'), msg: getMsg('water'), time: boilTime });
        
        const noodleTime = parseInt(document.getElementById('ramenType').value);
        steps.push({ name: getMsg('cook'), msg: getMsg('noodles'), time: noodleTime });

        if (document.getElementById('riceCake').checked || document.getElementById('greenOnion').checked || document.getElementById('cheese').checked) {
            steps.push({ name: "Topping", msg: getMsg('topping'), time: 30 });
        }
        if (document.getElementById('eggOption').value !== 'none') {
            steps.push({ name: "Egg", msg: getMsg('egg'), time: 40 });
        }
    }

    function startCurrentStep() {
        if (steps.length === 0) initSteps();
        document.getElementById('startBtn').disabled = true;
        document.getElementById('nextBtn').disabled = false;
        
        const step = steps[currentStep];
        document.getElementById('stepInfo').innerText = `${step.name}`;
        document.getElementById('statusMsg').innerText = step.msg;
        speak(step.msg);

        let timeLeft = step.time;
        updateTimerDisplay(timeLeft);

        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay(timeLeft);
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('statusMsg').innerText = "Step Complete!";
            }
        }, 1000);
    }

    function handleNextStep() {
        clearInterval(timerInterval);
        currentStep++;
        if (currentStep < steps.length) {
            document.getElementById('startBtn').disabled = false;
            document.getElementById('nextBtn').disabled = true;
            document.getElementById('timer').innerText = "00:00";
            document.getElementById('statusMsg').innerText = getMsg('ready');
        } else {
            speak(getMsg('finish'));
            alert(getMsg('finish'));
            resetApp();
        }
    }

    function updateTimerDisplay(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        document.getElementById('timer').innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function resetApp() {
        clearInterval(timerInterval);
        currentStep = 0;
        steps = [];
        document.getElementById('startBtn').disabled = false;
        document.getElementById('nextBtn').disabled = true;
        document.getElementById('timer').innerText = "00:00";
        document.getElementById('statusMsg').innerText = "Ready";
    }
</script>

</body>
</html>
